<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMD :: Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>
<body class="skin-classic">

<header>
    <div class="logo">CMD<span>::</span>ARENA</div>
    <div class="status-bar">
        <select class="header-select" id="skin-select" onchange="changeSkin(this.value)">
            <option value="skin-classic">SKIN: CLASSIC</option>
            <option value="skin-cyberpunk">SKIN: CYBERPUNK</option>
            <option value="skin-wasteland">SKIN: WASTELAND</option>
        </select>
        <select class="header-select" id="lang-select" onchange="changeLang(this.value)">
            <option value="ro">RO</option>
            <option value="en">EN</option>
        </select>
        <div>
            <div style="display:flex; align-items:center; justify-content:flex-end;">
                <span class="dot"></span><span id="ws-status">CONNECTING...</span>
            </div>
            <div id="current-player" style="color:var(--green-dim);margin-top:.2rem"></div>
        </div>
    </div>
</header>

<div class="container" id="lobby-section">
    <div>
        <div class="panel" id="panel-id">
            <span class="panel-label" id="lbl-ident">// IDENTIFICARE</span>
            <div class="field">
                <label id="lbl-callsign">CALLSIGN (Nume jucător)</label>
                <input type="text" id="player-id" placeholder="ex: ghost_r00t" maxlength="24">
            </div>
            <button class="btn btn-green" id="btn-ident" onclick="identify()">CONECTARE LA RETEA</button>
        </div>

        <div class="panel" id="panel-actions" style="display:none">
            <span class="panel-label" id="lbl-arena">// ARENĂ</span>
            <button class="btn btn-green" onclick="createArena()" id="btn-create">[ + ] CREAZĂ ARENĂ</button>
            <button class="btn btn-amber" onclick="joinSelected()" id="btn-join" disabled>[ → ] ALĂTURĂ-TE</button>
            <div style="margin:1rem 0; text-align:center; display:flex; gap:10px; justify-content:center;">
                <button class="btn" onclick="leaveArena()" id="btn-leave" style="display:none; border-color:var(--red); color:var(--red); width:auto;">[ X ] LEAVE</button>
                <button class="btn btn-green" onclick="setReady()" id="btn-ready" disabled style="width:auto;">[ ✓ ] SUNT READY</button>
            </div>
            <div id="ready-status" style="font-size:0.8rem; color:var(--text-dim); text-align:center;"></div>
        </div>
    </div>

    <div>
        <div class="panel">
            <span class="panel-label" id="lbl-list">// ARENE DISPONIBILE</span>
            <div class="arena-list" id="arena-list">
                <div class="empty-list" id="lbl-empty">Nicio arenă activă.</div>
            </div>
            <button class="btn btn-amber" id="btn-refresh" onclick="refreshArenas()" style="width:auto;margin-top:.8rem">[ ↻ ] REFRESH</button>
        </div>
    </div>
</div>

<div id="arena" style="display:none;">

    <div id="arena-bg"></div>
    <div class="base-sprite" id="base-sprite-player"></div>
    <div class="base-sprite" id="base-sprite-enemy"></div>

    <canvas id="strike-canvas"></canvas>

    <div id="phase-bar">
        <span class="phase-label">CMD::ARENA</span>
        <span id="phase-name">◼ SETUP PHASE</span>
        <span id="countdown">01:30</span>
    </div>

    <div class="hp-bar-wrap" id="hp-player">
        <span class="hp-label" id="lbl-sys-you">SYS INTEGRITY (YOU)</span>
        <div class="hp-track"><div class="hp-fill" id="hp-fill-p" style="width:100%"></div></div>
    </div>
    <div class="hp-bar-wrap" id="hp-enemy">
        <span class="hp-label" id="lbl-sys-enemy">SYS INTEGRITY (ENEMY)</span>
        <div class="hp-track"><div class="hp-fill" id="hp-fill-e" style="width:100%"></div></div>
    </div>

    <div id="terminal-win">
        <div class="term-titlebar" id="term-drag">
            <div class="term-btns"><span class="term-btn"></span><span class="term-btn"></span><span class="term-btn" style="background:#4A8C42"></span></div>
            <span id="lbl-term-title">CMD :: SECURE TERMINAL</span>
        </div>
        <div id="term-body" style="flex:1; padding: 4px; overflow: hidden; background: rgba(0,0,0,0.85);"></div>
    </div>

    <div id="pouch">
        <span class="pouch-label">POUCH</span>
        <div class="ability" id="ab-0" onclick="useAbility(0)">
            <span class="ab-icon">🚀</span><span class="ab-name">Strike</span><div class="cd-overlay" id="cd-0"></div>
        </div>
        <div class="ability" id="ab-1" onclick="useAbility(1)">
            <span class="ab-icon">🌀</span><span class="ab-name">Scramble</span><div class="cd-overlay" id="cd-1"></div>
        </div>
        <div class="ability" id="ab-2" onclick="useAbility(2)">
            <span class="ab-icon">🛡️</span><span class="ab-name">Shield</span><div class="cd-overlay" id="cd-2"></div>
        </div>
        <div class="ability" id="ab-3" onclick="useAbility(3)">
            <span class="ab-icon">📡</span><span class="ab-name">Sonar</span><div class="cd-overlay" id="cd-3"></div>
        </div>
    </div>

    <div id="notif"></div>
</div>

<div id="winner-overlay">
    <div class="winner-title" id="winner-title"></div>
    <div class="winner-sub" id="winner-sub"></div>
    <button class="btn btn-green" id="btn-restart" style="width:auto;padding:.6rem 2rem" onclick="location.reload()">[ ↺ ] JOACĂ DIN NOU</button>
</div>

<script>
    // --- SCHIMBARE SKIN ---
    function changeSkin(skinClass) {
        // Ștergem skin-ul vechi de pe body și îl adăugăm pe cel nou
        document.body.className = skinClass;
    }

    // --- DICȚIONAR MULTILINGV (i18n) ---
    const i18n = {
        ro: {
            titleLobby: "// IDENTIFICARE", lblCallsign: "CALLSIGN (Nume jucător)", btnConnect: "CONECTARE LA REȚEA",
            titleArena: "// ARENĂ", btnCreate: "[ + ] CREAZĂ ARENĂ", btnJoin: "[ → ] ALĂTURĂ-TE", btnReady: "[ ✓ ] SUNT READY",
            statusWaitPeer: "Așteaptă un adversar, apoi fă Ready.", statusReadyGo: "Fă Ready când ești pregătit.", statusPrep: "Se pregătesc containerele...",
            titleList: "// ARENE DISPONIBILE", emptyList: "Nicio arenă activă.", btnRefresh: "[ ↻ ] REFRESH",
            phaseSetup: "◼ SETUP PHASE", phaseInfil: "⚔ INFILTRATE PHASE",
            lblSysYou: "SYS INTEGRITY (YOU)", lblSysEnemy: "SYS INTEGRITY (ENEMY)", termTitle: "CMD :: SECURE TERMINAL",
            notifSetup: "FAZA SETUP: ASCUNDE PAROLA ÎN CONTAINER", notifInfil: "FAZA INFILTRATE: ATACĂ INAMICUL", notifOnlyInfil: "DOAR IN FAZA INFILTRATE!",
            winTitle: "☢ VICTORIE", loseTitle: "✗ ÎNFRÂNGERE", btnRestart: "[ ↺ ] JOACĂ DIN NOU",
            abStrikeEf: "TERMINAL INAMIC BLOCAT - 5s", abScrambleEf: "LS/FIND INAMIC BRUIAT - 15s", abShieldEf: "SCUT ACTIVAT", abSonarEf: "PING TRIMIS",
            wsOnline: "ONLINE", wsOffline: "OFFLINE", errName: "Introdu un nume!", hostText: "HOST:", guestText: "GUEST:", waitText: "așteaptă..."
        },
        en: {
            titleLobby: "// IDENTIFICATION", lblCallsign: "CALLSIGN (Player Name)", btnConnect: "CONNECT TO NETWORK",
            titleArena: "// ARENA", btnCreate: "[ + ] CREATE ARENA", btnJoin: "[ → ] JOIN SELECTED", btnReady: "[ ✓ ] I AM READY",
            statusWaitPeer: "Wait for an opponent, then press Ready.", statusReadyGo: "Press Ready when you are prepared.", statusPrep: "Preparing containers...",
            titleList: "// AVAILABLE ARENAS", emptyList: "No active arenas.", btnRefresh: "[ ↻ ] REFRESH",
            phaseSetup: "◼ SETUP PHASE", phaseInfil: "⚔ INFILTRATE PHASE",
            lblSysYou: "SYS INTEGRITY (YOU)", lblSysEnemy: "SYS INTEGRITY (ENEMY)", termTitle: "CMD :: SECURE TERMINAL",
            notifSetup: "SETUP PHASE: HIDE YOUR PASSWORD", notifInfil: "INFILTRATE PHASE: ATTACK THE ENEMY", notifOnlyInfil: "ONLY IN INFILTRATE PHASE!",
            winTitle: "☢ VICTORY", loseTitle: "✗ DEFEAT", btnRestart: "[ ↺ ] PLAY AGAIN",
            abStrikeEf: "ENEMY TERMINAL LOCKED - 5s", abScrambleEf: "ENEMY LS/FIND SCRAMBLED - 15s", abShieldEf: "SHIELD ACTIVATED", abSonarEf: "PING SENT",
            wsOnline: "ONLINE", wsOffline: "OFFLINE", errName: "Enter a callsign!", hostText: "HOST:", guestText: "GUEST:", waitText: "waiting..."
        }
    };

    let currentLang = 'ro';
    function changeLang(lang) {
        currentLang = lang; const t = i18n[lang];
        document.getElementById('lbl-ident').textContent = t.titleLobby;
        document.getElementById('lbl-callsign').textContent = t.lblCallsign;
        document.getElementById('btn-ident').textContent = t.btnConnect;
        document.getElementById('lbl-arena').textContent = t.titleArena;
        document.getElementById('btn-create').textContent = t.btnCreate;
        document.getElementById('btn-join').textContent = t.btnJoin;
        document.getElementById('btn-ready').textContent = t.btnReady;
        document.getElementById('lbl-list').textContent = t.titleList;
        document.getElementById('btn-refresh').textContent = t.btnRefresh;
        document.getElementById('lbl-sys-you').textContent = t.lblSysYou;
        document.getElementById('lbl-sys-enemy').textContent = t.lblSysEnemy;
        document.getElementById('lbl-term-title').textContent = t.termTitle;
        document.getElementById('btn-restart').textContent = t.btnRestart;

        if(document.querySelector('.empty-list')) document.querySelector('.empty-list').textContent = t.emptyList;
        if(state.phase === 'setup') document.getElementById('phase-name').textContent = t.phaseSetup;
        if(state.phase === 'infiltrate') document.getElementById('phase-name').textContent = t.phaseInfil;
        if(document.getElementById('ws-status').textContent === i18n['ro'].wsOnline || document.getElementById('ws-status').textContent === i18n['en'].wsOnline) { document.getElementById('ws-status').textContent = t.wsOnline; }

        ABILITIES[0].effect = t.abStrikeEf; ABILITIES[1].effect = t.abScrambleEf;
        ABILITIES[2].effect = t.abShieldEf; ABILITIES[3].effect = t.abSonarEf;
        refreshArenas();
    }

    // --- STARE JOC ---
    const state = { playerID: null, arenaID: null, role: null, phase: null, selectedArenaID: null, ws: null, countdownInterval: null, countdownSecs: 0 };
    let hpPlayer = 100, hpEnemy = 100;

    // --- LOBBY LOGIC ---
    function connectWS(playerID) {
        const proto = location.protocol==='https:'?'wss':'ws';
        const ws = new WebSocket(`${proto}://${location.host}/ws?player_id=${encodeURIComponent(playerID)}`);
        state.ws = ws;
        ws.onopen = () => { document.getElementById('ws-status').textContent = i18n[currentLang].wsOnline; document.getElementById('ws-status').style.color = 'var(--green)'; };
        ws.onclose = () => { document.getElementById('ws-status').textContent = i18n[currentLang].wsOffline; document.getElementById('ws-status').style.color = 'var(--red)'; setTimeout(()=>connectWS(playerID), 3000); };
        ws.onmessage = ev => { try { handleWSEvent(JSON.parse(ev.data)); } catch(e) {} };
    }

    function handleWSEvent(ev) {
        switch(ev.type) {
            case 'arena_list': renderArenaList(ev.payload); break;
            case 'game_start': onGameStart(ev.payload); break;
            case 'phase_change': onPhaseChange(ev.payload); break;
            case 'game_over': onGameOver(ev.payload); break;
        }
    }

    function renderArenaList(arenas) {
        const el = document.getElementById('arena-list');
        if (!arenas||!arenas.length) { el.innerHTML=`<div class="empty-list">${i18n[currentLang].emptyList}</div>`; return; }
        el.innerHTML='';
        arenas.forEach(a => {
            const d = document.createElement('div');
            d.className='arena-item'+(a.id===state.selectedArenaID?' selected':'');
            const guest = a.has_guest ? `<span style="color:var(--green-dim)">${a.guest_id}</span>` : `<span style="color:var(--text-dim)">${i18n[currentLang].waitText}</span>`;
            d.innerHTML=`<div><div class="arena-id">${a.id.slice(0,32)}</div><div class="arena-players">${i18n[currentLang].hostText} <span style="color:var(--green)">${a.host_id}</span> · ${i18n[currentLang].guestText} ${guest}</div></div>`;
            d.onclick=()=> { state.selectedArenaID = a.id; document.querySelectorAll('.arena-item').forEach(e=>e.classList.remove('selected')); d.classList.add('selected'); if (state.playerID && !state.arenaID) document.getElementById('btn-join').disabled = false; };
            el.appendChild(d);
        });
    }

    async function refreshArenas() { const r = await fetch('/api/arenas'); renderArenaList(await r.json()); }

    function identify() {
        const id = document.getElementById('player-id').value.trim().replace(/\s+/g,'_');
        if (!id) return alert(i18n[currentLang].errName);
        state.playerID = id;
        document.getElementById('current-player').textContent = `>> ${id}`;
        document.getElementById('panel-id').style.display = 'none';
        document.getElementById('panel-actions').style.display = 'block';
        connectWS(id);
    }

    async function createArena() {
        const r = await fetch('/api/arena/create',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({player_id:state.playerID}) });
        const d = await r.json(); state.arenaID = d.arena_id; state.role = d.role;
        document.getElementById('btn-create').disabled = true; document.getElementById('btn-join').disabled = true;
        document.getElementById('btn-leave').style.display = 'block';
        document.getElementById('btn-ready').disabled = false; document.getElementById('ready-status').textContent = i18n[currentLang].statusWaitPeer;
    }

    async function joinSelected() {
        const r = await fetch('/api/arena/join',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({arena_id:state.selectedArenaID, player_id:state.playerID}) });
        const d = await r.json(); state.arenaID = d.arena_id; state.role = d.role;
        document.getElementById('btn-create').disabled = true; document.getElementById('btn-join').disabled = true;
        document.getElementById('btn-leave').style.display = 'block';
        document.getElementById('btn-ready').disabled = false; document.getElementById('ready-status').textContent = i18n[currentLang].statusReadyGo;
    }

    async function leaveArena() {
        if (!state.arenaID) return;
        try {
            await fetch('/api/arena/leave', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ arena_id: state.arenaID, player_id: state.playerID }) });
            state.arenaID = null; state.role = null;
            document.getElementById('btn-leave').style.display = 'none';
            document.getElementById('btn-ready').disabled = true;
            document.getElementById('btn-create').disabled = false;
            if (state.selectedArenaID) document.getElementById('btn-join').disabled = false;
            document.getElementById('ready-status').textContent = '';
        } catch(e) { console.error(e); }
    }

    async function setReady() {
        await fetch('/api/arena/ready',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({arena_id:state.arenaID, player_id:state.playerID}) });
        document.getElementById('btn-ready').disabled = true;
        document.getElementById('ready-status').textContent = i18n[currentLang].statusPrep;
    }

    // --- GAME LOGIC ---
    let term, termFitAddon, termSocket;
    function initTerminal(arenaID, playerID) {
        if (term) term.dispose();
        term = new Terminal({ cursorBlink: true, fontFamily: '"Share Tech Mono", monospace', fontSize: 13, theme: { background: 'transparent', foreground: '#00ff41', cursor: '#00ff41' }});
        termFitAddon = new FitAddon.FitAddon(); term.loadAddon(termFitAddon);

        const termContainer = document.getElementById('term-body');
        termContainer.innerHTML = ''; term.open(termContainer); termFitAddon.fit();

        term.attachCustomKeyEventHandler((e) => {
            if (e.ctrlKey && e.code === 'KeyC' && e.type === 'keydown') {
                if (term.hasSelection()) { navigator.clipboard.writeText(term.getSelection()); term.clearSelection(); return false; }
                return true;
            }
            if (e.ctrlKey && e.code === 'KeyV' && e.type === 'keydown') return false;
            return true;
        });

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        termSocket = new WebSocket(`${proto}://${location.host}/ws/terminal?arena_id=${arenaID}&player_id=${playerID}`);
        termSocket.onmessage = (event) => term.write(event.data);
        term.onData((data) => { if (termSocket.readyState === WebSocket.OPEN) termSocket.send(data); });
    }

    function onGameStart(p) {
        state.phase = p.phase;
        document.getElementById('lobby-section').style.display = 'none';
        document.getElementById('arena').style.display = 'block';
        document.getElementById('phase-name').textContent = i18n[currentLang].phaseSetup;
        startCountdown(p.setup_seconds);
        initTerminal(state.arenaID, state.playerID);
        showNotif(i18n[currentLang].notifSetup);
    }

    function onPhaseChange(p) {
        if (p.phase !== 'infiltrate') return;
        state.phase = 'infiltrate';
        clearInterval(state.countdownInterval);
        document.getElementById('phase-name').textContent = i18n[currentLang].phaseInfil;
        document.getElementById('phase-name').style.color = '#C0704A';
        document.getElementById('countdown').textContent = '00:00';
        showNotif(i18n[currentLang].notifInfil);

        if (termSocket) termSocket.close();
        setTimeout(() => initTerminal(state.arenaID, state.playerID), 1000);
    }

    function onGameOver(p) {
        if (termSocket) termSocket.close();
        const o = document.getElementById('winner-overlay'); o.classList.add('show');
        document.getElementById('winner-title').textContent = p.you_won ? i18n[currentLang].winTitle : i18n[currentLang].loseTitle;
        document.getElementById('winner-title').className = 'winner-title ' + (p.you_won ? 'won' : 'lost');
    }

    function startCountdown(secs) {
        state.countdownSecs = secs;
        clearInterval(state.countdownInterval);
        const el = document.getElementById('countdown');
        state.countdownInterval = setInterval(()=>{
            state.countdownSecs--;
            if (state.countdownSecs <= 0) { clearInterval(state.countdownInterval); return; }
            el.textContent = String(Math.floor(state.countdownSecs/60)).padStart(2,'0')+':'+String(state.countdownSecs%60).padStart(2,'0');
        }, 1000);
    }

    // --- ABILITIES LOGIC ---
    const ABILITIES = [ { cd:20, effect:'' }, { cd:30, effect:'' }, { cd:45, effect:'' }, { cd:15, effect:'' } ];
    const cdTimers = [0,0,0,0];

    setInterval(()=>{
        cdTimers.forEach((t,i)=>{
            if (t > 0) {
                cdTimers[i]--; document.getElementById('cd-'+i).textContent = cdTimers[i];
                if (cdTimers[i] === 0) document.getElementById('ab-'+i).classList.remove('on-cd');
            }
        });
    }, 1000);

    async function useAbility(i) {
        if (state.phase !== 'infiltrate') { showNotif(i18n[currentLang].notifOnlyInfil); return; }
        const ab = document.getElementById('ab-'+i);
        if (ab.classList.contains('on-cd')) return;

        ab.classList.add('on-cd'); cdTimers[i] = ABILITIES[i].cd;
        fireStrike(i); showNotif(ABILITIES[i].effect || i18n[currentLang].abStrikeEf);

        await fetch('/api/ability', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ arena_id: state.arenaID, player_id: state.playerID, ability_id: i })
        });
    }

    function showNotif(msg) { const n = document.getElementById('notif'); n.textContent = msg; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'), 3000); }

    function fireStrike(idx) {
        const canvas = document.getElementById('strike-canvas'); const ctx = canvas.getContext('2d');
        const arena = document.getElementById('arena'); canvas.width = arena.offsetWidth; canvas.height = arena.offsetHeight;
        const ab = document.getElementById('ab-'+idx).getBoundingClientRect(); const ar = arena.getBoundingClientRect();
        const sx = ab.left - ar.left + ab.width/2; const sy = ab.top - ar.top + ab.height/2;
        const tx = arena.offsetWidth * 0.83; const ty = arena.offsetHeight * 0.42;
        const col = ['#C0A050','#C0704A','#4A8C42','#50A0C0'][idx];
        let t = 0;
        const interval = setInterval(()=>{
            ctx.clearRect(0,0,canvas.width,canvas.height);
            t++; const prog = t/30;
            const cx = sx + (tx-sx)*prog; const cy = sy + (ty-sy)*prog - Math.sin(prog*Math.PI)*80;
            ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fillStyle = col; ctx.fill();
            if (t >= 30) { clearInterval(interval); ctx.clearRect(0,0,canvas.width,canvas.height); }
        }, 16);
    }

    // Drag Terminal
    (function(){
        const win = document.getElementById('terminal-win'), handle = document.getElementById('term-drag');
        let dragging=false, ox=0, oy=0;
        handle.addEventListener('mousedown', e => { dragging=true; const r=win.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top; });
        document.addEventListener('mousemove', e => { if (!dragging) return; const ar=document.getElementById('arena').getBoundingClientRect(); win.style.left = Math.max(0,Math.min(ar.width-win.offsetWidth, e.clientX-ar.left-ox))+'px'; win.style.top = Math.max(32,Math.min(ar.height-win.offsetHeight-80, e.clientY-ar.top-oy))+'px'; });
        document.addEventListener('mouseup', ()=>dragging=false);
    })();
</script>
</body>
</html>
